<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <style>
      .lt { font-family: 'Arial Black', 'Arial', sans-serif; font-weight: 900; fill: white; }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <!-- White border glow (underneath) -->
  <rect x="18" y="18" width="464" height="464" rx="78" ry="78" fill="white" opacity="0.15"/>

  <!-- Main background -->
  <rect x="25" y="25" width="450" height="450" rx="72" ry="72" fill="#8B0000"/>

  <!-- Inner subtle dark border -->
  <rect x="25" y="25" width="450" height="450" rx="72" ry="72" fill="none" stroke="#6A0000" stroke-width="4"/>

  <!-- === CEU === -->
  <text x="250" y="158" class="lt" font-size="138" text-anchor="middle"
    stroke="#6A0000" stroke-width="6" stroke-linejoin="round" paint-order="stroke">ceu</text>

  <!-- === YELLOW BOWL / FACE ICON === -->
  <!-- Bowl body (bottom half ellipse) -->
  <path d="M148 258 Q250 328 352 258 L352 240 Q250 240 148 240 Z" fill="#FFD700"/>

  <!-- Bowl top rim -->
  <ellipse cx="250" cy="240" rx="102" ry="20" fill="#FFD700"/>

  <!-- Noodles / chips wavy top -->
  <path d="M168 232 Q183 218 198 232 Q213 246 228 232 Q243 218 258 232 Q273 246 288 232 Q303 218 318 232 Q330 222 334 230"
    fill="none" stroke="#C8900A" stroke-width="10" stroke-linecap="round"/>

  <!-- Smile mouth -->
  <path d="M213 272 Q250 296 287 272"
    fill="none" stroke="#6A0000" stroke-width="6" stroke-linecap="round"/>

  <!-- Left eye -->
  <ellipse cx="220" cy="260" rx="9" ry="8" fill="#6A0000"/>
  <circle cx="217" cy="258" r="3" fill="white" opacity="0.5"/>

  <!-- Right eye (i-dot style) + yellow accent -->
  <circle cx="310" cy="222" r="18" fill="#FFD700"/>
  <circle cx="310" cy="222" r="11" fill="#C8900A"/>

  <!-- === MIL === -->
  <text x="250" y="346" class="lt" font-size="132" text-anchor="middle"
    stroke="#6A0000" stroke-width="6" stroke-linejoin="round" paint-order="stroke">mil</text>

  <!-- === ANN === -->
  <text x="250" y="460" class="lt" font-size="132" text-anchor="middle"
    stroke="#6A0000" stroke-width="6" stroke-linejoin="round" paint-order="stroke">ann</text>
</svg>
