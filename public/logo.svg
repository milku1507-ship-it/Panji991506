<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 530" width="460" height="530">
  <defs>
    <style>
      .lt {
        font-family: 'Arial Rounded MT Bold', 'Arial Black', 'Helvetica Neue', Arial, sans-serif;
        font-weight: 900;
      }
    </style>
  </defs>

  <!-- White glow border -->
  <rect x="10" y="5" width="440" height="520" rx="78" ry="78"
    fill="none" stroke="white" stroke-width="22" opacity="0.95"/>

  <!-- Dark red main background -->
  <rect x="22" y="15" width="416" height="500" rx="68" ry="68" fill="#8B0000"/>

  <!-- ══════════════════════════════════ -->
  <!-- ROW 1: "Ceu"                        -->
  <!-- ══════════════════════════════════ -->
  <text x="230" y="165"
    class="lt" font-size="152" fill="white" text-anchor="middle"
    stroke="#6A0000" stroke-width="9" stroke-linejoin="round" paint-order="stroke">Ceu</text>

  <!-- ══════════════════════════════════ -->
  <!-- ROW 2: ICON (left) + "il" (right)  -->
  <!-- ══════════════════════════════════ -->

  <!-- Icon occupies roughly x:55–260, y:172–360 -->
  <!-- "il" occupies roughly x:260–415, y:215–355 -->

  <!-- === YELLOW FACE / BOWL CHARACTER === -->

  <!-- Noodle / chip strands (hair on top) -->
  <path d="M 64 192 Q 80 174 96 192 Q 112 210 128 192 Q 144 174 160 192 Q 176 210 192 192 Q 208 174 224 192 Q 236 182 248 190"
    fill="none" stroke="#C8900A" stroke-width="14" stroke-linecap="round"/>

  <!-- Noodle top flat bar -->
  <rect x="60" y="185" width="196" height="16" rx="8" fill="#FFD700"/>

  <!-- Face background (yellow filled shape) -->
  <!-- Large yellow arc / bowl (chin/smile) -->
  <path d="M 60 220 Q 58 340 160 356 Q 258 340 258 220 Z" fill="#FFD700"/>

  <!-- Inner bowl color (slightly darker) -->
  <path d="M 70 228 Q 68 332 160 345 Q 248 332 248 228 Z" fill="#E6A800"/>

  <!-- Face highlight: eyes area (lighter inner) -->
  <ellipse cx="160" cy="255" rx="80" ry="45" fill="#FFD700" opacity="0.5"/>

  <!-- Left eye -->
  <ellipse cx="128" cy="258" rx="14" ry="13" fill="#4A0000"/>
  <circle cx="124" cy="254" r="5" fill="white" opacity="0.5"/>

  <!-- Right eye -->
  <ellipse cx="196" cy="258" rx="14" ry="13" fill="#4A0000"/>
  <circle cx="192" cy="254" r="5" fill="white" opacity="0.5"/>

  <!-- Smile / mouth line -->
  <path d="M 132 284 Q 160 308 188 284"
    fill="none" stroke="#4A0000" stroke-width="8" stroke-linecap="round"/>

  <!-- Yellow i-dot (dot of letter "i", upper right) -->
  <circle cx="337" cy="190" r="24" fill="#FFD700"/>
  <circle cx="337" cy="190" r="15" fill="#E6A800"/>

  <!-- === "il" text (right half of middle row) === -->
  <text x="337" y="342"
    class="lt" font-size="148" fill="white" text-anchor="middle"
    stroke="#6A0000" stroke-width="9" stroke-linejoin="round" paint-order="stroke">il</text>

  <!-- ══════════════════════════════════ -->
  <!-- ROW 3: "an"                         -->
  <!-- ══════════════════════════════════ -->
  <text x="230" y="470"
    class="lt" font-size="152" fill="white" text-anchor="middle"
    letter-spacing="20"
    stroke="#6A0000" stroke-width="9" stroke-linejoin="round" paint-order="stroke">an</text>
</svg>
